<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 960" role="img" aria-labelledby="t d">
  <title id="t">Liaison Keyboard threads history preview</title>
  <desc id="d">Thread history preview with a recent conversation list and selected reply workspace.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1280" y2="880">
      <stop offset="0" stop-color="#07111d"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="card" x1="250" y1="110" x2="1150" y2="840">
      <stop offset="0" stop-color="#122033"/>
      <stop offset="1" stop-color="#0b1422"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="960" rx="42" fill="url(#bg)"/>
  <circle cx="300" cy="190" r="180" fill="#2dd4f0" fill-opacity=".08"/>
  <circle cx="1100" cy="200" r="160" fill="#8b5cf6" fill-opacity=".09"/>

  <rect x="170" y="102" width="1060" height="756" rx="34" fill="url(#card)" stroke="#28405b" stroke-width="2"/>
  <text x="210" y="170" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="36" font-weight="800">Threads</text>
  <text x="210" y="204" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Saved conversations</text>

  <rect x="210" y="246" width="336" height="610" rx="28" fill="#101826" stroke="#24364a"/>
  <text x="236" y="284" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.4">RECENT</text>
  <rect x="236" y="308" width="284" height="74" rx="20" fill="#122033" stroke="#2dd4f0" stroke-opacity=".28"/>
  <text x="260" y="340" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">Reply to Jordan</text>
  <text x="260" y="366" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Persona: The Diplomat</text>
  <rect x="236" y="396" width="284" height="74" rx="20" fill="#0f1a2a"/>
  <text x="260" y="428" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">Client follow-up</text>
  <text x="260" y="454" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Persona: The Closer</text>
  <rect x="236" y="484" width="284" height="74" rx="20" fill="#0f1a2a"/>
  <text x="260" y="516" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">Date night reply</text>
  <text x="260" y="542" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Persona: The Charmer</text>

  <rect x="566" y="246" width="624" height="610" rx="28" fill="#0f1a2a" stroke="#24364a"/>
  <text x="594" y="286" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="26" font-weight="800">Replying to Jordan</text>
  <text x="594" y="316" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">The Diplomat · 3 responses · Updated today</text>
  <rect x="594" y="352" width="560" height="110" rx="22" fill="#101826" stroke="#24364a"/>
  <text x="620" y="388" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Hey, can you send the updated proposal and a quick note on next steps?</text>
  <text x="620" y="420" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Incoming message cached in the thread.</text>

  <rect x="594" y="480" width="172" height="130" rx="22" fill="#111b2b" stroke="#2dd4f0" stroke-opacity=".34"/>
  <rect x="778" y="480" width="172" height="130" rx="22" fill="#111b2b" stroke="#24364a"/>
  <rect x="962" y="480" width="192" height="130" rx="22" fill="#111b2b" stroke="#24364a"/>
  <text x="620" y="516" fill="#2dd4f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">Natural</text>
  <text x="620" y="542" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">Absolutely - I’ll send the updated proposal now.</text>
  <text x="804" y="516" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">Keep It Going</text>
  <text x="804" y="542" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">Happy to send that over, plus next-step ideas.</text>
  <text x="988" y="516" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">Quick</text>
  <text x="988" y="542" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">Sending the update now.</text>

  <rect x="594" y="642" width="560" height="110" rx="24" fill="#101826" stroke="#24364a"/>
  <text x="620" y="680" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Paste your message here...</text>
  <rect x="960" y="670" width="170" height="52" rx="16" fill="#2dd4f0"/>
  <text x="1045" y="704" fill="#04111b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="800" text-anchor="middle">Generate</text>
</svg>
