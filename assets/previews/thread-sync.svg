<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 960" role="img" aria-labelledby="t d">
  <title id="t">Liaison Reply thread sync</title>
  <desc id="d">Threads persisting across devices and sessions, showing sync status.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1280" y2="880">
      <stop offset="0" stop-color="#07111d"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="sync" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4f0"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="960" rx="42" fill="url(#bg)"/>
  <circle cx="700" cy="200" r="200" fill="url(#sync)" fill-opacity=".06"/>

  <rect x="170" y="102" width="1060" height="756" rx="34" fill="#0e1628" stroke="#28405b" stroke-width="2"/>
  <text x="210" y="160" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="32" font-weight="800">Your threads, everywhere</text>
  <text x="210" y="192" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Sign in to sync — no data loss</text>

  <rect x="210" y="230" width="340" height="610" rx="28" fill="#101826" stroke="#24364a"/>
  <text x="236" y="268" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.4">YOUR THREADS</text>

  <rect x="236" y="296" width="288" height="70" rx="18" fill="#122033" stroke="#2dd4f0" stroke-opacity=".3"/>
  <text x="260" y="328" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">Reply to Jordan</text>
  <text x="260" y="350" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">3 messages · Synced</text>

  <rect x="236" y="380" width="288" height="70" rx="18" fill="#0f1a2a" stroke="#24364a"/>
  <text x="260" y="412" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">Client follow-up</text>
  <text x="260" y="434" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">6 messages · Synced</text>

  <rect x="236" y="464" width="288" height="70" rx="18" fill="#0f1a2a" stroke="#24364a"/>
  <text x="260" y="496" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">Date night reply</text>
  <text x="260" y="518" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">5 messages · Synced</text>

  <rect x="236" y="548" width="288" height="70" rx="18" fill="#0f1a2a" stroke="#24364a"/>
  <text x="260" y="580" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">Family boundary</text>
  <text x="260" y="602" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">8 messages · Synced</text>

  <rect x="236" y="632" width="288" height="70" rx="18" fill="#0f1a2a" stroke="#24364a"/>
  <text x="260" y="664" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">Work negotiation</text>
  <text x="260" y="686" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">4 messages · Synced</text>

  <rect x="570" y="230" width="660" height="610" rx="28" fill="#0f1a2a" stroke="#24364a"/>
  <text x="600" y="270" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">SYNC STATUS</text>

  <rect x="600" y="300" width="600" height="80" rx="20" fill="#101826" stroke="#10b981" stroke-opacity=".4"/>
  <text x="624" y="332" fill="#10b981" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">✓ All threads synced</text>
  <text x="624" y="358" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">Last sync: Just now</text>

  <rect x="600" y="400" width="280" height="100" rx="22" fill="#101826" stroke="#24364a"/>
  <text x="624" y="432" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Desktop</text>
  <text x="624" y="460" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">Mac · Chrome</text>
  <circle cx="840" cy="450" r="8" fill="#10b981"/>

  <rect x="600" y="520" width="280" height="100" rx="22" fill="#101826" stroke="#24364a"/>
  <text x="624" y="552" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Mobile</text>
  <text x="624" y="580" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">iPhone · Safari</text>
  <circle cx="840" cy="570" r="8" fill="#10b981"/>

  <rect x="600" y="640" width="280" height="100" rx="22" fill="#101826" stroke="#24364a"/>
  <text x="624" y="672" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Tablet</text>
  <text x="624" y="700" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">iPad · Safari</text>
  <circle cx="840" cy="690" r="8" fill="#10b981"/>

  <rect x="910" y="640" width="290" height="100" rx="22" fill="#101826" stroke="#24364a"/>
  <text x="934" y="672" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Web</text>
  <text x="934" y="700" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">Any browser</text>
  <circle cx="1160" cy="690" r="8" fill="#10b981"/>

  <rect x="600" y="760" width="600" height="80" rx="20" fill="#122033" stroke="#2dd4f0" stroke-opacity=".2"/>
  <text x="624" y="794" fill="#2dd4f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600">Threads persist across sessions — close and reopen anytime</text>
</svg>