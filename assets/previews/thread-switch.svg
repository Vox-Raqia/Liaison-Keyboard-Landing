<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 960" role="img" aria-labelledby="t d">
  <title id="t">Liaison Reply thread switching</title>
  <desc id="d">Switching between different thread contexts, showing clear active thread indicator.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1280" y2="880">
      <stop offset="0" stop-color="#07111d"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="960" rx="42" fill="url(#bg)"/>
  <circle cx="300" cy="200" r="180" fill="#2dd4f0" fill-opacity=".06"/>
  <circle cx="1100" cy="220" r="150" fill="#f472b6" fill-opacity=".06"/>

  <rect x="170" y="102" width="1060" height="756" rx="34" fill="#0e1628" stroke="#28405b" stroke-width="2"/>
  <text x="210" y="160" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="36" font-weight="800">Threads</text>

  <rect x="210" y="200" width="260" height="658" rx="26" fill="#101826" stroke="#24364a"/>

  <rect x="230" y="220" width="220" height="70" rx="18" fill="#122033" stroke="#2dd4f0" stroke-opacity=".3"/>
  <text x="250" y="252" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">Reply to Jordan</text>
  <text x="250" y="272" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Updated 2m ago</text>
  <circle cx="410" cy="255" r="8" fill="#2dd4f0"/>

  <rect x="230" y="300" width="220" height="70" rx="18" fill="#0f1a2a" stroke="#24364a"/>
  <text x="250" y="332" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">Client follow-up</text>
  <text x="250" y="352" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Updated yesterday</text>

  <rect x="230" y="380" width="220" height="70" rx="18" fill="#0f1a2a" stroke="#24364a"/>
  <text x="250" y="412" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">Date night reply</text>
  <text x="250" y="432" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Updated 3 days ago</text>

  <rect x="230" y="460" width="220" height="70" rx="18" fill="#0f1a2a" stroke="#24364a"/>
  <text x="250" y="492" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">Family boundary</text>
  <text x="250" y="512" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Updated last week</text>

  <rect x="490" y="200" width="720" height="658" rx="26" fill="#0f1a2a" stroke="#24364a"/>
  <text x="520" y="250" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="26" font-weight="800">Client follow-up</text>
  <text x="520" y="280" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">The Closer · 6 responses</text>

  <rect x="520" y="310" width="660" height="90" rx="20" fill="#101826" stroke="#24364a"/>
  <text x="544" y="345" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Need the invoice by Friday. Please confirm.</text>

  <rect x="520" y="420" width="660" height="90" rx="20" fill="#101826" stroke="#24364a"/>
  <text x="544" y="455" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Invoice sent. Let me know if you need adjustments.</text>

  <rect x="520" y="530" width="660" height="90" rx="20" fill="#101826" stroke="#24364a"/>
  <text x="544" y="565" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Sounds good. Thanks!</text>

  <rect x="520" y="640" width="300" height="110" rx="22" fill="#111b2b" stroke="#24364a"/>
  <text x="544" y="676" fill="#2dd4f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">Natural</text>
  <text x="544" y="706" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">Got it. Sending over now.</text>

  <rect x="840" y="640" width="300" height="110" rx="22" fill="#111b2b" stroke="#24364a"/>
  <text x="864" y="676" fill="#2dd4f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">Keep it going</text>
  <text x="864" y="706" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">On it—will include the revised timeline.</text>

  <rect x="520" y="770" width="660" height="70" rx="20" fill="#101826" stroke="#24364a"/>
  <text x="544" y="806" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Continue this thread...</text>
  <rect x="1020" y="782" width="136" height="46" rx="14" fill="#2dd4f0"/>
  <text x="1088" y="812" fill="#04111b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Send</text>

  <rect x="1040" y="130" width="160" height="40" rx="20" fill="#101826" stroke="#2dd4f0" stroke-opacity=".3"/>
  <text x="1120" y="156" fill="#2dd4f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Active</text>
</svg>