<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 960" role="img" aria-labelledby="t d">
  <title id="t">Liaison Reply new thread</title>
  <desc id="d">Creating a new thread with clean context, no prior conversation loaded.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1280" y2="880">
      <stop offset="0" stop-color="#07111d"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="960" rx="42" fill="url(#bg)"/>
  <circle cx="280" cy="180" r="160" fill="#10b981" fill-opacity=".07"/>
  <circle cx="1120" cy="220" r="140" fill="#8b5cf6" fill-opacity=".08"/>

  <rect x="170" y="102" width="1060" height="756" rx="34" fill="#0e1628" stroke="#28405b" stroke-width="2"/>
  <text x="210" y="165" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="32" font-weight="800">New thread</text>
  <text x="210" y="198" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Fresh context — nothing loaded</text>

  <rect x="210" y="240" width="260" height="618" rx="26" fill="#101826" stroke="#24364a"/>
  <text x="236" y="280" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.4">THREADS</text>

  <rect x="236" y="304" width="208" height="60" rx="16" fill="#0f1a2a" stroke="#24364a"/>
  <text x="256" y="336" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">+ New thread</text>

  <rect x="236" y="380" width="208" height="60" rx="16" fill="#0f1a2a" stroke="#24364a"/>
  <text x="256" y="412" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Reply to Jordan</text>
  <text x="256" y="428" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Yesterday</text>

  <rect x="236" y="456" width="208" height="60" rx="16" fill="#0f1a2a" stroke="#24364a"/>
  <text x="256" y="488" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Client follow-up</text>
  <text x="256" y="504" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">2 days ago</text>

  <rect x="236" y="532" width="208" height="60" rx="16" fill="#0f1a2a" stroke="#24364a"/>
  <text x="256" y="564" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Date night reply</text>
  <text x="256" y="580" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Last week</text>

  <rect x="490" y="240" width="720" height="618" rx="26" fill="#0f1a2a" stroke="#24364a"/>
  <text x="520" y="290" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="1.2">INCOMING MESSAGE</text>

  <rect x="520" y="320" width="660" height="120" rx="22" fill="#101826" stroke="#24364a"/>
  <text x="544" y="360" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Hey, are we still on for Saturday?</text>
  <text x="544" y="390" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">New conversation</text>

  <rect x="520" y="480" width="660" height="80" rx="22" fill="#111b2b" stroke="#24364a" stroke-dasharray="8 4" opacity=".5"/>
  <text x="544" y="518" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Thread context will load after first reply</text>

  <rect x="520" y="600" width="660" height="90" rx="22" fill="#111b2b" stroke="#24364a"/>
  <text x="544" y="636" fill="#10b981" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">Natural</text>
  <text x="620" y="636" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">"Absolutely! What time works for you?"</text>
  <text x="544" y="660" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Fresh thread — no prior context</text>

  <rect x="520" y="710" width="660" height="90" rx="22" fill="#111b2b" stroke="#24364a"/>
  <text x="544" y="746" fill="#10b981" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">Keep it going</text>
  <text x="660" y="746" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">"Yes! I'd love to catch up. Saturday works."</text>

  <rect x="520" y="820" width="660" height="50" rx="18" fill="#101826" stroke="#24364a"/>
  <text x="544" y="850" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Paste your message...</text>
</svg>