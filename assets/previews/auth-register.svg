<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 960" role="img" aria-labelledby="t d">
  <title id="t">Liaison register preview</title>
  <desc id="d">Registration form preview with verification success state.</desc>
  <defs>
    <linearGradient id="bg" x1="110" y1="70" x2="1090" y2="890">
      <stop offset="0" stop-color="#07111d"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="card" x1="260" y1="120" x2="940" y2="840">
      <stop offset="0" stop-color="#122033"/>
      <stop offset="1" stop-color="#0b1422"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="960" rx="42" fill="url(#bg)"/>
  <circle cx="250" cy="180" r="180" fill="#2dd4f0" fill-opacity=".07"/>
  <circle cx="940" cy="220" r="160" fill="#8b5cf6" fill-opacity=".10"/>

  <rect x="290" y="96" width="620" height="768" rx="34" fill="url(#card)" stroke="#28405b" stroke-width="2"/>
  <text x="600" y="184" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="54" font-weight="800" text-anchor="middle">Create Account</text>
  <text x="600" y="220" fill="#c6d2e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" text-anchor="middle">Start your AI conversation journey</text>

  <rect x="340" y="274" width="520" height="68" rx="18" fill="#101826" stroke="#24364a"/>
  <text x="362" y="301" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.3">EMAIL ADDRESS *</text>
  <text x="362" y="328" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Email</text>
  <rect x="340" y="362" width="520" height="68" rx="18" fill="#101826" stroke="#24364a"/>
  <text x="362" y="389" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.3">PASSWORD *</text>
  <text x="362" y="416" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Password</text>
  <rect x="340" y="450" width="520" height="68" rx="18" fill="#101826" stroke="#24364a"/>
  <text x="362" y="477" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.3">CONFIRM PASSWORD *</text>
  <text x="362" y="504" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Confirm Password</text>
  <rect x="340" y="548" width="520" height="70" rx="18" fill="#2dd4f0"/>
  <text x="600" y="593" fill="#04111b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" text-anchor="middle">Create Account</text>

  <rect x="340" y="640" width="520" height="124" rx="22" fill="#0f1a2a" stroke="#28405b"/>
  <circle cx="382" cy="692" r="22" fill="#2dd4f0" fill-opacity=".18" stroke="#2dd4f0"/>
  <text x="382" y="699" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Email</text>
  <text x="430" y="680" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="800">Check your email</text>
  <text x="430" y="712" fill="#c6d2e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Verify your account to finish sign-up.</text>
  <text x="430" y="742" fill="#8fa0b5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Open Mail App · Back to Login</text>
